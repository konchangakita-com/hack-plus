services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: hack-plus-website
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    command: npm run dev
    stdin_open: true
    tty: true
